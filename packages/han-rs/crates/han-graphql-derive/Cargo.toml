[package]
name = "han-graphql-derive"
version = "0.1.0"
edition = "2021"
description = "Proc macros for auto-generating GraphQL types from SeaORM entities"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full", "extra-traits"] }
quote = "1"
proc-macro2 = "1"
convert_case = "0.6"
